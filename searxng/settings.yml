use_default_settings: true

general:
  debug: false
  instance_name: "local-search-agent"

server:
  secret_key: "local-dev-secret-change-in-prod"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: "http://localhost:8888/"

ui:
  static_use_hash: true

search:
  formats:
    - html
    - json
  safe_search: 0
  default_lang: ""
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
